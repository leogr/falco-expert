name: check-docs

# Validate the knowledge base's authored documentation on every pull request and
# on pushes to the default branch.
#
# All three checks (implemented by tools/check-docs/main.go, Go stdlib only) run in
# a SINGLE job WITH submodules. check-md-links and check-refs-paths both resolve
# links that point into refs/, so the refs/ submodules (and their nested submodules,
# e.g. falco-website's Docsy theme) must be checked out for those checks to pass;
# check-index-drift also compares the refs/ tree against the navigation indexes.

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  check-docs:
    name: check-docs
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          # No go.mod/go.sum: nothing to cache, and caching keyed on go.sum would warn.
          cache: false

      - name: Run documentation checks
        run: make check-docs
