name: check-docs

# Enforce the knowledge base's documentation validation on every pull request
# and on pushes to the default branch.
#
# The checks are implemented by tools/check-docs/main.go (Go stdlib only) and
# exposed through the Makefile targets. They split cleanly by whether they need
# the refs/ git submodules to be checked out:
#
#   - check-md-links    : repo-authored local markdown links  (no submodules)
#   - check-index-drift : navigation indexes vs filesystem     (no submodules)
#   - check-refs-paths  : links INTO refs/                      (REQUIRES submodules)
#
# We therefore use two jobs: a fast "docs" job without submodules for the common
# path, and a "refs-links" job that checks out the submodules only to validate
# refs/ link integrity.

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  # Fast path: validates repo-authored markdown without cloning any submodule.
  docs:
    name: docs (md-links + index-drift)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          # No go.mod / dependencies: nothing to cache, and cache is keyed on
          # go.sum (absent here), which would emit a warning. Disable it.
          cache: false

      - name: Check markdown links
        run: make check-md-links

      - name: Check index drift
        run: make check-index-drift

  # Validates links into refs/, which requires the refs/ submodules (and their
  # nested submodules, e.g. falco-website's Docsy theme) to be present.
  refs-links:
    name: refs-links (refs-paths)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Check refs paths
        run: make check-refs-paths
